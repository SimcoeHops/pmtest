<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1017" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f3f4f8" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Helm">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Helm — Projects & Tasks</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<!-- iOS splash screens — eliminates the white flash on launch from home screen -->
<link rel="apple-touch-startup-image" href="/icons/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png"  media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="layout">

  <aside id="sidebar">
    <div class="brand">
      <span class="brand-mark">⎈</span>
      <span class="brand-name">Helm</span>
    </div>
    <nav id="nav">
      <a href="#/dashboard" data-route="dashboard"><span class="nav-ic">◈</span> Dashboard</a>
      <a href="#/today" data-route="today"><span class="nav-ic">☀</span> My Day <span class="nav-count" id="count-today"></span></a>
      <a href="#/projects" data-route="projects"><span class="nav-ic">▣</span> Projects <span class="nav-count" id="count-projects"></span></a>
      <a href="#/tasks" data-route="tasks"><span class="nav-ic">☑</span> Tasks <span class="nav-count" id="count-tasks"></span></a>
      <a href="#/board" data-route="board"><span class="nav-ic">⫿</span> Board</a>
      <a href="#/report" data-route="report"><span class="nav-ic">⎙</span> Report</a>
      <a href="#/settings" data-route="settings"><span class="nav-ic">⚙</span> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <button class="btn btn-primary btn-block" id="btn-capture">＋ Quick capture <kbd>N</kbd></button>
      <div class="shortcut-hints">
        <span><kbd>/</kbd> search</span><span><kbd>P</kbd> new project</span>
      </div>
    </div>
  </aside>

  <main id="main">
    <header id="topbar">
      <button id="btn-menu" class="icon-btn" aria-label="Menu">☰</button>
      <div id="searchbox">
        <span class="search-ic">⌕</span>
        <input id="search" type="search" placeholder="Search projects, tasks, tags…" autocomplete="off">
      </div>
      <button class="icon-btn" id="btn-bell" title="Alerts & reminders">🔔<span id="bell-badge" class="bell-badge" hidden></span></button>
      <button class="icon-btn" id="btn-theme" title="Toggle theme">◐</button>
      <button class="btn btn-primary" id="btn-capture-top">＋ Capture</button>
    </header>
    <div id="view"></div>
  </main>

  <nav id="mobilenav">
    <a href="#/dashboard" data-route="dashboard"><span class="mob-icon">◈</span><span>Home</span></a>
    <a href="#/today" data-route="today"><span class="mob-icon">☀</span><span>My Day</span></a>
    <a href="#/capture" id="mob-capture" class="mob-fab" aria-label="Quick capture">＋</a>
    <a href="#/projects" data-route="projects"><span class="mob-icon">▣</span><span>Projects</span></a>
    <a href="#/tasks" data-route="tasks"><span class="mob-icon">☑</span><span>Tasks</span></a>
  </nav>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="/js/app.js"></script>
</body>
</html>
